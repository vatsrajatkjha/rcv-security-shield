name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3']
        laravel: ['^11.0', '^12.0']

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2
          extensions: mbstring, intl, zip, pdo_sqlite

      - uses: ramsey/composer-install@v3
        with:
          dependency-versions: highest

      - name: Require Laravel matrix version
        run: composer require --no-interaction --no-update "illuminate/support:${{ matrix.laravel }}" "illuminate/contracts:${{ matrix.laravel }}" "illuminate/database:${{ matrix.laravel }}" "illuminate/queue:${{ matrix.laravel }}" "illuminate/http:${{ matrix.laravel }}" "illuminate/console:${{ matrix.laravel }}" "illuminate/events:${{ matrix.laravel }}" "illuminate/filesystem:${{ matrix.laravel }}" "illuminate/log:${{ matrix.laravel }}"

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction

      - name: Validate composer
        run: composer validate --strict

      - name: Coding standards
        run: composer lint

      - name: Static analysis
        run: composer analyse

      - name: Test suite
        run: composer test
